name: Update IAM Policy

on:
    workflow_dispatch:

permissions:
    id-token: write
    contents: read

jobs:
    update-policy:
        name: Create new IAM policy version
        runs-on: ubuntu-24.04

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
                  role-session-name: github-actions-update-iam-policy
                  aws-region: ${{ secrets.DEFAULT_AWS_REGION }}

            - name: Update IAM policy version
              run: |
                  AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
                  echo "Account ID: $AWS_ACCOUNT_ID"
                  aws iam create-policy-version \
                    --policy-arn "arn:aws:iam::${AWS_ACCOUNT_ID}:policy/github-actions-deploy-policy" \
                    --policy-document file://iam/github-actions-deploy-policy.json \
                    --set-as-default
                  echo "Policy updated successfully"
